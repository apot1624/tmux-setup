
# 将前缀键设置为反引号 `
set -g prefix '`'
# 解除默认的 Ctrl-b 绑定
unbind C-b

# 开启vi风格后，支持vi的C-d、C-u、hjkl等快捷键
setw -g mode-keys vi
# 将 prefix s 绑定为按名称排序的会话树
bind s choose-tree -Zs -O name
# 将 prefix + ; 绑定为切换到上一个窗口
bind ';' last-window

# 使用支持 256 色和现代终端特性的 tmux 终端类型
set -g default-terminal "tmux-256color"
# 开启 tmux 剪切板支持，允许通过 OSC52 复制到系统剪切板
set -g set-clipboard on
# 声明这些终端类型支持剪切板功能，便于 tmux 透传 OSC52
set -as terminal-features ',wezterm:clipboard'
set -as terminal-features ',xterm-256color:clipboard'
set -as terminal-features ',tmux-256color:clipboard'

#Tmux plugin manager.
set -g @plugin 'tmux-plugins/tpm' 
# 引入插件配置文件
source-file ~/.tmux.conf.plugins
# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
